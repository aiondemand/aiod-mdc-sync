version: "3.8"

networks:
  pocnet:

services:
  primary-mysql:
    image: mysql:8.0
    container_name: db-mysql
    env_file: .env
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog_format=ROW
      - --binlog_row_image=FULL
      - --binlog_expire_logs_seconds=604800
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["3306:3306"]
    networks: [pocnet]
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  primary-api:
    build:
      context: ../app
    container_name: db-api
    depends_on: [primary-mysql]
    env_file: .env
    environment:
      DB_HOST: primary-mysql
      DB_PORT: 3306
    ports: ["8000:8000"]
    command: ["--port", "8000"]
    networks: [pocnet]

  # Kafka Connect running Debezium source
  connect-src:
    image: quay.io/debezium/connect:2.6
    container_name: db-connect
    depends_on: [primary-mysql]
    network_mode: host
    dns: ["8.8.8.8", "8.8.4.4"]
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: pkc-921jm.us-east-2.aws.confluent.cloud:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: dbz_config
      CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONFIG_STORAGE_PARTITIONS: 1
      OFFSET_STORAGE_TOPIC: dbz_offsets
      OFFSET_STORAGE_REPLICATION_FACTOR: 3
      OFFSET_STORAGE_PARTITIONS: 25
      STATUS_STORAGE_TOPIC: dbz_statuses
      STATUS_STORAGE_REPLICATION_FACTOR: 3
      STATUS_STORAGE_PARTITIONS: 5
      # Confluent Cloud security settings - using producer/consumer/admin prefixes
      CONNECT_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_SASL_MECHANISM: PLAIN
      CONNECT_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="APIKEY" password="API SECRET";'
      CONNECT_PRODUCER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_PRODUCER_SASL_MECHANISM: PLAIN
      CONNECT_PRODUCER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="APIKEY" password="API SECRET";'
      CONNECT_CONSUMER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_CONSUMER_SASL_MECHANISM: PLAIN
      CONNECT_CONSUMER_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="APIKEY" password="API SECRET";'
      CONNECT_SESSION_TIMEOUT_MS: 45000
      CONNECT_REQUEST_TIMEOUT_MS: 60000
      # Optional: converters & logging
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      KAFKA_LOG4J_OPTS: "-Dlog4j.configuration=file:/etc/kafka/connect-log4j.properties"
    volumes:
      - ./debezium-source.json:/tmp/connector.json:ro
      - ./connect-log4j.properties:/etc/kafka/connect-log4j.properties:ro
      - ./connect-distributed.properties:/etc/kafka/connect-distributed.properties:ro
      - ./scripts/register_connector.sh:/usr/local/bin/register_connector.sh:ro
      - ./entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
