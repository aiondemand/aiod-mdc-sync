version: "3.8"

networks:
  pocnet:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [pocnet]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    env_file: .env
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: |
        PLAINTEXT://0.0.0.0:9092,
        EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: |
        PLAINTEXT://kafka:9092,
        EXTERNAL://${PRIMARY_PUB_IP}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"   # internal (optional to expose)
      - "9093:9093"   # external, reachable by secondary
    networks: [pocnet]

  primary-mysql:
    image: mysql:8.0
    env_file: .env
    command: --server-id=1 --log-bin=mysql-bin --binlog_format=ROW
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["3306:3306"]
    networks: [pocnet]

  primary-api:
    build: ./app
    depends_on: [primary-mysql]
    env_file: .env
    environment:
      DB_HOST: primary-mysql
      DB_PORT: 3306
    ports: ["8000:8000"]
    networks: [pocnet]

  # Kafka Connect running Debezium source
  connect-src:
    image: quay.io/debezium/connect:2.6
    container_name: primary-connect-src-1
    depends_on: [kafka, primary-mysql]
    networks: [pocnet]
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: dbz_config
      OFFSET_STORAGE_TOPIC: dbz_offsets
      STATUS_STORAGE_TOPIC: dbz_statuses
      # Optional: converters & logging
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KAFKA_LOG4J_OPTS: "-Dlog4j.configuration=file:/etc/kafka/connect-log4j.properties"
    volumes:
      - ./debezium-source.json:/tmp/connector.json:ro
      - ./connect-log4j.properties:/etc/kafka/connect-log4j.properties:ro
    # No custom command: let the entrypoint start the worker
