version: "3.8"

networks:
  pocnet:

services:
  secondary-mysql:
    image: mysql:8.0
    env_file: .env
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --server-id=2
    ports: ["3306:3306"]
    networks: [pocnet]

  secondary-api:
    build: ./app
    depends_on: [secondary-mysql]
    env_file: .env
    environment:
      DB_HOST: secondary-mysql
      DB_PORT: 3306
    ports: ["8000:8000"]
    networks: [pocnet]

  connect-sink:
    image: confluentinc/kafka-connect-jdbc:10.7.0
    env_file: .env
    depends_on: [secondary-mysql]
    networks: [pocnet]
    ports: ["8083:8083"]
    environment:
      CONNECT_BOOTSTRAP_SERVERS: ${PRIMARY_PUB_IP}:9093
      CONNECT_GROUP_ID: sink
      CONNECT_CONFIG_STORAGE_TOPIC: sink_config
      CONNECT_OFFSET_STORAGE_TOPIC: sink_offsets
      CONNECT_STATUS_STORAGE_TOPIC: sink_status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java
    volumes:
      - ./jdbc-sink.json:/tmp/sink.json:ro
    command: >
      bash -c "
        connect-distributed /etc/kafka/connect-distributed.properties &
        sleep 20 &&
        curl -s -X POST -H 'Content-Type: application/json' \
             --data @/tmp/sink.json \
             http://localhost:8083/connectors &&
        tail -f /dev/null
      "
