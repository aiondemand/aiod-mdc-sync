
networks:
  pocnet:

services:
  secondary-mysql:
    image: mysql:8.0
    container_name: "secondary-mysql"
    env_file: .env
    command: --server-id=2 --default-authentication-plugin=mysql_native_password
    ports: ["3306:3306"]
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [pocnet]

  secondary-api:
    build:
      context: ../app
    container_name: "secondary-api"
    depends_on: [secondary-mysql]
    env_file: .env
    environment:
      DB_HOST: secondary-mysql
      DB_PORT: 3306
    ports: ["8001:8001"]
    command: ["--port", "8001"]
    networks: [pocnet]

  connect-sink:
    build: .
    container_name: connect-sink
    env_file: .env
    networks: [pocnet]
    ports: ["8083:8083"]
    restart: unless-stopped
    environment:
      CONNECT_GROUP_ID: sink
      CONNECT_CONFIG_STORAGE_TOPIC: sink_config
      CONNECT_OFFSET_STORAGE_TOPIC: sink_offsets
      CONNECT_STATUS_STORAGE_TOPIC: sink_status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_PLUGIN_PATH: /usr/share/confluent-hub-components
      CONNECT_CONSUMER_REQUEST_TIMEOUT_MS: 60000
      CONNECT_CONSUMER_SESSION_TIMEOUT_MS: 60000
      CONNECT_PRODUCER_MAX_BLOCK_MS: 60000
      CONNECT_SECURITY_PROTOCOL: ${CONNECT_SECURITY_PROTOCOL:-SSL}
      CONNECT_SSL_TRUSTSTORE_LOCATION: ${CONNECT_SSL_TRUSTSTORE_LOCATION:-/etc/kafka/secrets/kafka.client.truststore.p12}
      CONNECT_SSL_TRUSTSTORE_PASSWORD: ${CONNECT_SSL_TRUSTSTORE_PASSWORD:-}
      CONNECT_SSL_TRUSTSTORE_TYPE: ${CONNECT_SSL_TRUSTSTORE_TYPE:-PKCS12}
      CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-HTTPS}
    volumes:
      - ./jdbc-sink.json:/tmp/sink.json:ro
      - ./secrets:/etc/kafka/secrets:ro
    command:
      - bash
      - -lc
      - |
        set -euo pipefail

        # 1) Resolve bootstrap (supports either var; set ONE in .env)
        BS="$${CONNECT_BOOTSTRAP_SERVERS:-$${BOOTSTRAP_SERVERS:-}}"
        if [ -z "$$BS" ]; then
          echo "ERROR: Set CONNECT_BOOTSTRAP_SERVERS or BOOTSTRAP_SERVERS in .env (e.g. 10.151.16.160:9093)"; exit 1;
        fi
        echo "Using bootstrap.servers=$$BS"

        # 2) Quick TCP probe
        H="$${BS%:*}"; P="$${BS##*:}"
        (bash -lc ">/dev/tcp/$$H/$$P") || { echo "ERROR: Cannot reach $$H:$$P from connect-sink"; exit 2; }

        # 3) Generate properties explicitly (no chance of localhost:9092)
        {
          printf 'bootstrap.servers=%s\n' "$$BS"
          printf 'group.id=%s\n' "$${CONNECT_GROUP_ID:-sink}"
          printf 'key.converter=%s\n' "$${CONNECT_KEY_CONVERTER:-org.apache.kafka.connect.json.JsonConverter}"
          printf 'value.converter=%s\n' "$${CONNECT_VALUE_CONVERTER:-org.apache.kafka.connect.json.JsonConverter}"
          printf 'key.converter.schemas.enable=%s\n' "$${CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE:-false}"
          printf 'value.converter.schemas.enable=%s\n' "$${CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE:-false}"
          printf 'config.storage.topic=%s\n' "$${CONNECT_CONFIG_STORAGE_TOPIC:-sink_config}"
          printf 'offset.storage.topic=%s\n' "$${CONNECT_OFFSET_STORAGE_TOPIC:-sink_offsets}"
          printf 'status.storage.topic=%s\n' "$${CONNECT_STATUS_STORAGE_TOPIC:-sink_status}"
          printf 'config.storage.replication.factor=%s\n' "$${CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR:-1}"
          printf 'offset.storage.replication.factor=%s\n' "$${CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR:-1}"
          printf 'status.storage.replication.factor=%s\n' "$${CONNECT_STATUS_STORAGE_REPLICATION_FACTOR:-1}"
          printf 'plugin.path=%s\n' "$${CONNECT_PLUGIN_PATH:-/usr/share/confluent-hub-components}"
          if [ -n "${CONNECT_SECURITY_PROTOCOL:-}" ]; then
            printf 'security.protocol=%s\n' "$${CONNECT_SECURITY_PROTOCOL}"
            printf 'producer.security.protocol=%s\n' "$${CONNECT_SECURITY_PROTOCOL}"
            printf 'consumer.security.protocol=%s\n' "$${CONNECT_SECURITY_PROTOCOL}"
          fi
          if [ -n "${CONNECT_SSL_TRUSTSTORE_LOCATION:-}" ]; then
            if [ ! -f "${CONNECT_SSL_TRUSTSTORE_LOCATION}" ]; then
              echo "ERROR: Truststore ${CONNECT_SSL_TRUSTSTORE_LOCATION} missing" >&2
              exit 4
            fi
            if [ "${CONNECT_SECURITY_PROTOCOL:-}" = "SSL" ] && [ -z "${CONNECT_SSL_TRUSTSTORE_PASSWORD:-}" ]; then
              echo "ERROR: CONNECT_SSL_TRUSTSTORE_PASSWORD must be set when using SSL" >&2
              exit 5
            fi
            printf 'ssl.truststore.location=%s\n' "$${CONNECT_SSL_TRUSTSTORE_LOCATION}"
            printf 'producer.ssl.truststore.location=%s\n' "$${CONNECT_SSL_TRUSTSTORE_LOCATION}"
            printf 'consumer.ssl.truststore.location=%s\n' "$${CONNECT_SSL_TRUSTSTORE_LOCATION}"
            if [ -n "${CONNECT_SSL_TRUSTSTORE_PASSWORD:-}" ]; then
              printf 'ssl.truststore.password=%s\n' "$${CONNECT_SSL_TRUSTSTORE_PASSWORD}"
              printf 'producer.ssl.truststore.password=%s\n' "$${CONNECT_SSL_TRUSTSTORE_PASSWORD}"
              printf 'consumer.ssl.truststore.password=%s\n' "$${CONNECT_SSL_TRUSTSTORE_PASSWORD}"
            fi
            if [ -n "${CONNECT_SSL_TRUSTSTORE_TYPE:-}" ]; then
              printf 'ssl.truststore.type=%s\n' "$${CONNECT_SSL_TRUSTSTORE_TYPE}"
              printf 'producer.ssl.truststore.type=%s\n' "$${CONNECT_SSL_TRUSTSTORE_TYPE}"
              printf 'consumer.ssl.truststore.type=%s\n' "$${CONNECT_SSL_TRUSTSTORE_TYPE}"
            fi
            if [ -n "${CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}" ]; then
              printf 'ssl.endpoint.identification.algorithm=%s\n' "$${CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM}"
              printf 'producer.ssl.endpoint.identification.algorithm=%s\n' "$${CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM}"
              printf 'consumer.ssl.endpoint.identification.algorithm=%s\n' "$${CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM}"
            fi
          fi
        } > /tmp/connect-distributed.properties

        grep '^bootstrap.servers' /tmp/connect-distributed.properties

        # 4) Start Connect using our file
        connect-distributed /tmp/connect-distributed.properties &

        # 5) Wait for REST
        for i in $(seq 1 300); do curl -fsS http://localhost:8083/ >/dev/null && break || sleep 1; done
        curl -fsS http://localhost:8083/ >/dev/null || { echo "ERROR: REST not ready after 300s"; exit 3; }

        # 6) Idempotent registration
        curl -fsS http://localhost:8083/connectors/mysql-sink >/dev/null || \
          curl -fsS -X POST -H 'Content-Type: application/json' --data @/tmp/sink.json http://localhost:8083/connectors

        # 7) Keep container alive
        tail -f /dev/null
